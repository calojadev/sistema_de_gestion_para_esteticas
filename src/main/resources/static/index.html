<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Gestión para Estéticas</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/estilos.css" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <span class="navbar-brand">
          <i class="bi bi-scissors"></i> Sistema Gestión Estéticas
        </span>
      </div>
    </nav>

    <div class="container mt-5">
      <h2 class="mb-4 text-center">Panel Principal</h2>
      <div class="row g-4 justify-content-center">
        <div class="col-md-3">
          <a href="clientes.html" class="text-decoration-none">
            <div class="card card-modulo shadow-sm text-center p-4">
              <i class="bi bi-people fs-1 text-primary"></i>
              <h5 class="mt-3">Clientes</h5>
              <p class="text-muted small">Gestionar clientes registrados</p>
            </div>
          </a>
        </div>

        <div class="col-md-3">
          <a href="profesionales.html" class="text-decoration-none">
            <div class="card card-modulo shadow-sm text-center p-4">
              <i class="bi bi-person-badge fs-1 text-success"></i>
              <h5 class="mt-3">Profesionales</h5>
              <p class="text-muted small">Gestionar profesionales</p>
            </div>
          </a>
        </div>

        <div class="col-md-3">
          <a href="servicios.html" class="text-decoration-none">
            <div class="card card-modulo shadow-sm text-center p-4">
              <i class="bi bi-list-stars fs-1 text-success"></i>
              <h5 class="mt-3">Servicios</h5>
              <p class="text-muted small">Gestionar servicios ofrecidos</p>
            </div>
          </a>
        </div>

        <div class="col-md-3">
          <a href="reservas.html" class="text-decoration-none">
            <div class="card card-modulo shadow-sm text-center p-4">
              <i class="bi bi-calendar-check fs-1 text-danger"></i>
              <h5 class="mt-3">Reservas</h5>
              <p class="text-muted small">Gestionar reservas y turnos</p>
            </div>
          </a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
