<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Servicios — Sistema Gestión Estéticas</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/estilos.css" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <i class="bi bi-scissors"></i> Sistema Gestión Estéticas
        </a>
        <span class="text-white"
          ><i class="bi bi-clipboard-list"></i> Servicios</span
        >
      </div>
    </nav>

    <div class="container mt-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Gestión de Servicios</h4>
        <button class="btn btn-warning" onclick="abrirModalNuevo()">
          <i class="bi bi-plus-circle"></i> Nuevo Servicio
        </button>
      </div>

      <!-- Búsqueda por nombre -->
      <div class="card mb-4 shadow-sm">
        <div class="card-body">
          <div class="row g-2 align-items-end">
            <div class="col-md-4">
              <label class="form-label">Buscar por nombre</label>
              <input
                type="text"
                id="inputBuscarNombre"
                class="form-control"
                placeholder="Ej: Corte"
              />
            </div>
            <div class="col-md-2">
              <button
                class="btn btn-outline-warning w-100"
                onclick="buscarPorNombre()"
              >
                <i class="bi bi-search"></i> Buscar
              </button>
            </div>
            <div class="col-md-2">
              <button
                class="btn btn-outline-secondary w-100"
                onclick="cargarTodos()"
              >
                <i class="bi bi-arrow-clockwise"></i> Ver todos
              </button>
            </div>
          </div>
        </div>
      </div>

      <div id="alerta" class="alert d-none"></div>

      <div class="card shadow-sm">
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Precio</th>
                <th>Duración</th>
                <th class="text-center">Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaServicios">
              <tr>
                <td colspan="5" class="text-center text-muted py-4">
                  Cargando servicios...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Modal crear/editar -->
    <div class="modal fade" id="modalServicio" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-dark text-white">
            <h5 class="modal-title" id="modalTitulo">Nuevo Servicio</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="servicioId" />
            <div class="mb-3">
              <label class="form-label"
                >Nombre <span class="text-danger">*</span></label
              >
              <input
                type="text"
                id="inputNombre"
                class="form-control"
                placeholder="Ej: Corte de cabello"
              />
            </div>
            <div class="mb-3">
              <label class="form-label">Descripción</label>
              <textarea
                id="inputDescripcion"
                class="form-control"
                rows="2"
                placeholder="Descripción opcional"
              ></textarea>
            </div>
            <div class="row g-2">
              <div class="col-md-6 mb-3">
                <label class="form-label"
                  >Precio (Gs.) <span class="text-danger">*</span></label
                >
                <input
                  type="number"
                  id="inputPrecio"
                  class="form-control"
                  placeholder="0"
                  min="0"
                />
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Duración (minutos)</label>
                <input
                  type="number"
                  id="inputDuracion"
                  class="form-control"
                  placeholder="Ej: 30"
                  min="1"
                />
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              type="button"
              class="btn btn-warning"
              onclick="guardarServicio()"
            >
              <i class="bi bi-save"></i> Guardar
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal confirmar eliminación -->
    <div class="modal fade" id="modalEliminar" tabindex="-1">
      <div class="modal-dialog modal-sm">
        <div class="modal-content">
          <div class="modal-header bg-danger text-white">
            <h5 class="modal-title">Confirmar eliminación</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <p>¿Estás seguro que deseas eliminar este servicio?</p>
            <p class="text-muted small">Esta acción no se puede deshacer.</p>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary btn-sm"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              type="button"
              class="btn btn-danger btn-sm"
              onclick="confirmarEliminar()"
            >
              <i class="bi bi-trash"></i> Eliminar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/servicios.js"></script>
  </body>
</html>
