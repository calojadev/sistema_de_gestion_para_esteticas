<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clientes — Sistema Gestión Estéticas</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/estilos.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <i class="bi bi-scissors"></i> Sistema Gestión Estéticas
        </a>
        <span class="text-white"><i class="bi bi-people"></i> Clientes</span>
      </div>
    </nav>

    <div class="container mt-4">
      <!-- Encabezado + botón nuevo -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Gestión de Clientes</h4>
        <button class="btn btn-primary" onclick="abrirModalNuevo()">
          <i class="bi bi-plus-circle"></i> Nuevo Cliente
        </button>
      </div>

      <!-- Búsqueda por CI -->
      <div class="card mb-4 shadow-sm">
        <div class="card-body">
          <div class="row g-2 align-items-end">
            <div class="col-md-4">
              <label class="form-label">Buscar por CI</label>
              <input
                type="number"
                id="inputBuscarCI"
                class="form-control"
                placeholder="Ej: 12345678"
              />
            </div>
            <div class="col-md-2">
              <button
                class="btn btn-outline-primary w-100"
                onclick="buscarPorCI()"
              >
                <i class="bi bi-search"></i> Buscar
              </button>
            </div>
            <div class="col-md-2">
              <button
                class="btn btn-outline-secondary w-100"
                onclick="cargarTodos()"
              >
                <i class="bi bi-arrow-clockwise"></i> Ver todos
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Alerta de mensajes -->
      <div id="alerta" class="alert d-none"></div>

      <!-- Tabla de clientes -->
      <div class="card shadow-sm">
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead>
              <tr>
                <th>CI</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Correo</th>
                <th>Teléfono</th>
                <th>Dirección</th>
                <th class="text-center">Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaClientes">
              <tr>
                <td colspan="7" class="text-center text-muted py-4">
                  Cargando clientes...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Modal crear/editar cliente -->
    <div class="modal fade" id="modalCliente" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-dark text-white">
            <h5 class="modal-title" id="modalTitulo">Nuevo Cliente</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="clienteCI" />
            <div class="mb-3">
              <label class="form-label"
                >CI <span class="text-danger">*</span></label
              >
              <input
                type="number"
                id="inputCI"
                class="form-control"
                placeholder="Cédula de identidad"
              />
            </div>
            <div class="row g-2">
              <div class="col-md-6 mb-3">
                <label class="form-label"
                  >Nombre <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  id="inputNombre"
                  class="form-control"
                  placeholder="Nombre"
                />
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label"
                  >Apellido <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  id="inputApellido"
                  class="form-control"
                  placeholder="Apellido"
                />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Correo</label>
              <input
                type="email"
                id="inputCorreo"
                class="form-control"
                placeholder="correo@ejemplo.com"
              />
            </div>
            <div class="row g-2">
              <div class="col-md-6 mb-3">
                <label class="form-label">Teléfono</label>
                <input
                  type="text"
                  id="inputTelefono"
                  class="form-control"
                  placeholder="0981123456"
                />
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Dirección</label>
                <input
                  type="text"
                  id="inputDireccion"
                  class="form-control"
                  placeholder="Dirección"
                />
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              type="button"
              class="btn btn-primary"
              onclick="guardarCliente()"
            >
              <i class="bi bi-save"></i> Guardar
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal confirmar eliminación -->
    <div class="modal fade" id="modalEliminar" tabindex="-1">
      <div class="modal-dialog modal-sm">
        <div class="modal-content">
          <div class="modal-header bg-danger text-white">
            <h5 class="modal-title">Confirmar eliminación</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <p>¿Estás seguro que deseas eliminar este cliente?</p>
            <p class="text-muted small">Esta acción no se puede deshacer.</p>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary btn-sm"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              type="button"
              class="btn btn-danger btn-sm"
              onclick="confirmarEliminar()"
            >
              <i class="bi bi-trash"></i> Eliminar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/clientes.js"></script>
  </body>
</html>
